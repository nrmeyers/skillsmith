$schema: task-fixture.v4
task_id: T3b

description: |
  ## Task

  Add a JWT-protected async endpoint at `GET /protected` to
  `/workspace/app/main.py`. The route must:

  1. Accept HS256 JWTs from the `Authorization: Bearer <token>`
     header.
  2. Validate the token's signature against the secret at
     `os.environ["JWT_HS256_SECRET"]`, with the algorithm whitelist
     restricted to `["HS256"]`.
  3. Validate `exp`, `iss`, and `aud` claims. Required `iss` value
     comes from `os.environ["JWT_EXPECTED_ISSUER"]`; required `aud`
     from `os.environ["JWT_EXPECTED_AUDIENCE"]`.
  4. Be implemented as an `async def` route function, with the JWT
     validation expressed as a FastAPI dependency injected via
     `Depends(...)`.
  5. Return 200 with `{"sub": <subject>, "iss": <issuer>}` on a
     valid token. Return 401 on any signature, claim, or
     algorithm-whitelist failure.

  The seed `app/main.py` carries the existing FastAPI app
  construction with the lifespan context, the TrustedHost +
  CORS middleware stack from T3a, and the included webhook router.
  T3b extends that app with the protected endpoint and its
  authentication dependency. The webhook handler and middleware
  must remain functional after the modification — adding auth to
  one route must not regress the others.

  ## Do

  - Add a `GET /protected` route to `/workspace/app/main.py`,
    declared as `async def`.
  - Implement a FastAPI dependency function (decorated with the
    bearer-scheme dependency, e.g. `HTTPBearer(auto_error=False)`)
    that resolves a verified JWT claims dict.
  - Inject the dependency into `/protected` via `Depends(...)`.
  - Inside the dependency, call `jwt.decode(...)` with
    `algorithms=["HS256"]`, `options={"require": ["exp", "iss", "aud"]}`,
    `issuer=...`, `audience=...`, and a small `leeway` value
    (e.g., `leeway=30`).
  - Return 200 with `{"sub": claims["sub"], "iss": claims["iss"]}`
    on success.
  - Map every JWT validation failure to HTTP 401.

  ## Do not

  - Do not put the JWT verification in middleware. The
    fastapi-middleware-patterns guardrail is explicit:
    authentication belongs in dependencies, not middleware.
  - Do not include `none` in the `algorithms` whitelist. The
    jwt-validation-patterns guardrail forbids it categorically.
  - Do not accept HS256 and RS256 simultaneously with the same
    configured key — that is the algorithm-confusion attack
    described in the activated fragments.
  - Do not enumerate failure causes to clients. The body returned
    on auth failure must be uniform across signature, expiry,
    audience, issuer, and missing-required-claim failures —
    operator detail strings can differ in logs, but the
    HTTP status and visible response body must not distinguish
    failure modes to the requester.
  - Do not modify `app/webhooks.py` or any file other than
    `app/main.py`.
  - Do not import any third-party library not already listed in
    the pinned `pyproject.toml`.
  - Do not add `HTTPSRedirectMiddleware`, rate limiting, or any
    cross-cutting middleware not present in the seed; T3b's scope
    is JWT auth on a single route, not a security-baseline
    expansion.

  ## Mechanical success criteria

  - GET `/protected` with a valid HS256 JWT bearer token returns
    200 with a body containing `sub` and `iss` fields populated
    from the token's claims.
  - GET `/protected` with an expired JWT returns 401.
  - GET `/protected` with a JWT signed by a different secret
    returns 401.
  - GET `/protected` with a JWT whose `aud` claim does not match
    the expected audience returns 401.
  - GET `/protected` with no `Authorization` header returns 401.
  - The webhook route from the seed (POST `/webhooks/stripe`)
    continues to work — adding the protected endpoint does not
    regress the webhook flow.
  - The FastAPI app starts cleanly under uvicorn after the
    modification.

