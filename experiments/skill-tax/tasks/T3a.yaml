$schema: task-fixture.v3
task_id: T3a

description: |
  ## Task

  Wire the existing webhook receiver from `app/webhooks.py` into the
  FastAPI application at `/workspace/app/main.py` and apply the
  security-baseline middleware stack documented in the activated
  fragments. The result must be a single FastAPI app where:

  1. The webhook route at `POST /webhooks/stripe` is reachable
     through the application's middleware stack.
  2. `TrustedHostMiddleware` rejects requests whose `Host` header is
     not in the allowlist.
  3. `CORSMiddleware` is configured with explicit origins (not `*`
     in combination with credentials).
  4. The `webhook_deliveries` Postgres pool established by the
     existing `lifespan` context remains available to the webhook
     handler as `app.state.db` (or via a request-scoped
     dependency, per the fragments).

  The seed `app/main.py` carries an empty FastAPI app construction;
  `app/webhooks.py` carries the verified-and-replay-protected handler
  from the T2 reference solution as a `from fastapi import APIRouter`
  module exposing `router: APIRouter`. The model must include the
  router in the FastAPI app and add the middleware stack via the
  `middleware=[Middleware(...)]` argument to `FastAPI(...)`.

  Allowed host: `api.example.com`. Allowed CORS origin:
  `https://app.example.com`. Allowed methods: `POST`, `OPTIONS`.
  Allowed headers: `Content-Type`, `Stripe-Signature`. Both values
  are also captured in `seed/test-host-config.yaml` for reference;
  the model may hard-code them in `app/main.py` or read them from
  `os.environ` — either is fragment-faithful.

  ## Do

  - Construct the FastAPI app with `lifespan=...` (existing context
    in seed) and `middleware=[Middleware(TrustedHostMiddleware,
    allowed_hosts=[...]), Middleware(CORSMiddleware, ...)]`.
  - Include `webhooks.router` on the app via `app.include_router(...)`.
  - Configure `CORSMiddleware` with explicit `allow_origins=[...]`,
    `allow_credentials=True`, `allow_methods=["POST", "OPTIONS"]`,
    `allow_headers=["Content-Type", "Stripe-Signature"]`.
  - Configure `TrustedHostMiddleware` with `allowed_hosts=[
    "api.example.com"]`.
  - Keep the existing lifespan context as the single source of pool
    initialization; do not wire a second pool.

  ## Do not

  - Do not edit `app/webhooks.py`. The handler in that file is
    already correct against the T2 fragment surface; T3a's scope is
    middleware composition, not handler logic.
  - Do not add `HTTPSRedirectMiddleware`, `GZipMiddleware`, or any
    middleware not named above. The fragments document them as
    available, but T3a's success criteria only require the host pin
    and CORS.
  - Do not implement authentication. JWT-protected routes are T3b
    territory and out of T3a's activated-fragment scope.
  - Do not modify any file other than `app/main.py`.
  - Do not import any third-party library not already listed in
    the pinned `pyproject.toml`.
  - Do not use `@app.on_event("startup")` / `@app.on_event("shutdown")`.
    Both are deprecated per the fastapi-middleware-patterns
    guardrail; the seed lifespan context is the supported shape.

  ## Mechanical success criteria

  - A POST to `/webhooks/stripe` with the correct `Host: api.example.com`
    and a valid `Stripe-Signature` returns 200 with `{"received": true}`.
  - A POST with `Host: evil.example.com` is rejected by
    `TrustedHostMiddleware` with HTTP 400.
  - A CORS preflight OPTIONS request from `Origin: https://app.example.com`
    receives an Access-Control-Allow-Origin header naming that origin.
  - A CORS preflight OPTIONS request from `Origin: https://evil.example.com`
    does NOT receive an Access-Control-Allow-Origin header for that
    origin (browser would block; server may still respond 200, but
    without the permissive header).
  - The FastAPI app starts cleanly under uvicorn after the
    modification.

skills_activated:
  - webhook-patterns
  - fastapi-middleware-patterns

app_skeleton:
  seed_branch: pilot-seed/T3a
