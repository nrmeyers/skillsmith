      ## Guardrails: never do these

      These are the lines you do not cross when implementing a webhook receiver. Each item below has bitten production systems; the verification and example sections show the right shape.

      - Never compare signatures with `==` or `!=`. String equality short-circuits on the first differing byte and leaks the signature one byte at a time through timing side channels. Use `hmac.compare_digest`, which is constant-time for equal-length inputs.
      - Never call `await request.json()` (or any body-parsing dependency) before verifying the signature. Once the body is parsed and re-serialized, the bytes you hash will not match the bytes the sender hashed. Verification will silently fail. Read raw bytes via `await request.body()` first, verify, then parse JSON yourself.
      - Never hard-code the webhook secret. Secrets in source rotate by force-push and leak through git history. The receiver must read from env or a secret manager. `grep -rn 'whsec_' src/` should return nothing.
      - Never trust an unsigned event. No fallback path that skips verification "for testing" or "when the header is missing" — those paths ship to production. Reject with 400 or 401, no exception.
      - Never use HMAC-SHA1 (or anything else) for new receivers. GitHub's legacy `X-Hub-Signature` header is SHA-1 and is deprecated; new receivers use `X-Hub-Signature-256`. Do not accept SHA-1 even as a fallback.
      - Never call `hmac.new(key, msg)` without `digestmod`. Python 3.8 made `digestmod` required (verified 2026-05-01); the two-argument form raises `TypeError` on 3.8+ and was silently insecure on older runtimes.
      - Never leave the dedup row after the handler fails. A persisted row plus a 5xx response means the sender's retry hits the unique constraint, gets a 200, and the event is silently lost. Either roll the row back on failure or wrap (insert + handler work) in one transaction.
      - Never return 4xx on duplicate delivery. A 4xx tells the sender to keep retrying; a 200 tells it to stop. Duplicates are a successful no-op from the sender's perspective.
      - Never trust the timestamp without checking tolerance. A signed request whose timestamp is unbounded is a forever-valid replay token. Reject anything older than 300 seconds (or the sender's documented tolerance).
      - Never log raw signatures, secrets, or full request headers at info level. They become a credential exfiltration surface. Redact in logs; sample-debug only in dev.

  - sequence: 9
    fragment_type: anti_pattern
    content: |
      ## Common bug: parsing Stripe-Signature positionally

      The `Stripe-Signature` header is a comma-separated list of `key=value` pairs — typically `t=<unix_ts>,v1=<hex_sig>` but Stripe reserves the right to add new keys (`v2=...`) or rotate the order. Implementations that parse positionally — e.g. `header.split(",")[1].split("=")[1]` to grab the signature — break the moment the header carries a different ordering or new keys, and silently accept tampered requests during the rotation window.

      Observed in small-model traces: `expected_sig = sig_header.split(",")[1]` and equivalents.

      **Why this is wrong:** positional indexing is fragile against header evolution and against headers that include three or more pairs. `split(",")[1]` returns `"v1=abc"` (still includes the `v1=` prefix), so the subsequent `compare_digest(computed, "v1=abc")` always fails.

      **Correct approach:** parse into a dict by `=` then look up `v1` (and `t`) by key. The reference implementation is in `webhook-patterns:4` under "per-vendor signature schemes — Stripe."

  - sequence: 10
    fragment_type: anti_pattern
    content: |
      ## Common bug: wrong status codes on signature failure

      Webhook receivers must distinguish three failure modes by status code: missing/malformed header (`401`), cryptographic verification failure (`400`), and stale-timestamp/replay (`400`). Successful verification is `200` — *always* — even on duplicate delivery (200 with `{"duplicate": true}`).

      Observed in small-model traces: returning `401` on cryptographic failure (mixing the two failure paths), returning `({"error": "..."}, 400)` as a tuple (FastAPI does not coerce tuples into HTTP responses; this leaks a 200 with a serialized tuple body), returning `200` with an error payload on signature failure (tells the sender to stop retrying when the event was actually rejected).

      **Why this matters:** senders use status codes to decide retry behavior. A `200` on a rejected event means the sender drops it; a `4xx` on a duplicate means the sender keeps retrying forever. Mixing 400 and 401 confuses operations and breaks alerting.

      **Correct approach:** use `raise HTTPException(status_code=400, detail=...)` (or `401` for missing header). Never return tuples. Never return `200` from a path where verification failed. The reference is `webhook-patterns:8` (guardrail "Never trust an unsigned event") and the response-shape contract in `webhook-patterns:6` (the FastAPI handler example).

  - sequence: 11
    fragment_type: anti_pattern
    content: |
      ## Common bug: hallucinated SDK behavior

      The Stripe Python SDK's `stripe.Webhook.construct_event(payload, sig_header, secret, tolerance=...)` is a single call that performs HMAC verification, timestamp tolerance check, and signature parsing — and raises `stripe.error.SignatureVerificationError` (or `ValueError` on malformed payload) on any failure. It does NOT silently return `None`, does NOT internally call `hmac.compare_digest` (that is the manual path), and the `tolerance` parameter is in seconds (300 is the documented default).

      Observed in small-model traces: comments asserting "stripe>=10.0 uses hmac.compare_digest internally" (false — `construct_event` does its own constant-time comparison; the comment misrepresents what the SDK does and may mislead a reviewer), wrapping `construct_event` in a generic `except Exception` (swallows the verification error type and converts crypto failures into 500 errors), or treating `construct_event` as a no-op that "validates if it doesn't raise" without catching the specific `stripe.error.SignatureVerificationError`.

      **Why this matters:** mis-modeling the SDK's contract leaks 500 errors on what should be 400s, and adds false comments that survive code review and confuse the next reader.

      **Correct approach:** if using the SDK path, catch `stripe.error.SignatureVerificationError` specifically and raise `HTTPException(status_code=400, ...)`. If using the manual path, do not import `stripe` at all — use `hmac.new(...).hexdigest()` and `hmac.compare_digest`. Do not mix the two. The reference is `webhook-patterns:6` (the SDK example) and `webhook-patterns:3` (the manual HMAC procedure).

  - sequence: 12
    fragment_type: anti_pattern
    content: |
      ## Common bug: emitting structural markers as content

      The output format requires `[FILE: <path>]` markers OUTSIDE any code fences, on their own lines, as instructions to the verifier. They are NOT part of the file content. Writing `FILE: /workspace/app/main.py` as a literal text line above a code block (without the `[`/`]` brackets), or including the marker text inside a `\`\`\`python` fence, breaks the verifier and the trial counts as a faithfulness failure even when the underlying code is correct.

      Observed in small-model traces: writing `FILE: /workspace/app/main.py` as plain prose above the fenced code (no brackets, no parsing as a marker), or wrapping the entire response in a single `\`\`\`python` fence that swallows the `[FILE:]` marker.

      **Why this matters:** the verifier reads `[FILE: <path>]` as a structural directive. Without that exact bracketed shape on its own line, the response is treated as a single unstructured blob and parsing fails — regardless of how correct the code inside is.

      **Correct approach:** the response must contain one or more `[FILE: <path>]` lines, each followed immediately by the raw file content (no fences, or fences that the verifier strips). The reference is the locked governance preamble (`prompts/governance-preamble-2026-05-01.v2.md`).
