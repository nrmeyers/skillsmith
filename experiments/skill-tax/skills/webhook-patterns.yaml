raw_prose: |
  # Webhook Receiver Patterns

  ## Why this skill exists

  Webhook receiver patterns center on three procedures: signature verification (HMAC-SHA256), replay protection (timestamp tolerance plus event-id idempotency), and raw-body capture before any JSON parser runs. Skip any of the three and the receiver becomes either an injection vector or a silent data-loss surface.

  This skill is FastAPI/Python flavored because the canonical receiver pattern crosses two trust boundaries — the wire (HMAC) and the application (idempotency table) — and FastAPI's middleware ordering and APIRoute customization are where the raw-body capture lives.

  Use this skill when receiving webhooks from Stripe, GitHub, Slack, Standard Webhooks-compliant senders (Svix, Zapier, Twilio), or any custom webhook source; reviewing webhook receiver code for the three-procedure baseline; or implementing a new webhook handler that must be deterministic under retries.

  The skill covers receiver-side only. Sender-side concerns — retry policy, jitter, dead-letter queue — belong in a separate skill.

  ## Setup: environment, imports, raw-body capture

  Webhook secrets are per-endpoint and must come from the environment, not source. Required env vars per provider:

  ```
  STRIPE_WEBHOOK_SECRET=whsec_...      # Stripe-issued, per-endpoint
  GITHUB_WEBHOOK_SECRET=...            # operator-chosen, set in repo webhook settings
  SLACK_SIGNING_SECRET=...             # Slack signing secret from app config
  ```

  The receiver imports use Python's stdlib `hmac` for the constant-time comparison, `hashlib` for the digest algorithm, and FastAPI's `Request` for the raw body. Stripe's Python SDK provides a verification helper that wraps both:

  ```python
  import hmac
  import hashlib
  import os
  from fastapi import FastAPI, Request, HTTPException
  import stripe                          # stripe>=10.0 — uses hmac.compare_digest internally
  ```

  Middleware order matters. FastAPI parses JSON bodies via dependency injection at the route level, not via global middleware, so the raw bytes are available via `await request.body()` inside the route handler — but only if no upstream middleware has consumed the stream. The supported pattern (FastAPI docs, "Custom Request and APIRoute class", verified 2026-05-01) is to override `APIRoute.get_route_handler` so the raw body is read once and cached on the request before any body-parsing dependency runs. Alternative: read `await request.body()` inside the route function and parse JSON manually — simpler but couples verification to handler.

  ## Verifying the signature: HMAC-SHA256 with constant-time comparison

  Every supported scheme uses HMAC-SHA256 over a sender-defined string-to-sign. The receiver computes the same HMAC with the shared secret and compares against the header. Comparison must use `hmac.compare_digest` (Python stdlib, verified 2026-05-01 against docs.python.org/3/library/hmac.html), never `==` — string equality short-circuits on the first differing byte and leaks the signature one byte at a time through timing side channels. `hmac.compare_digest` is constant-time for equal-length inputs and accepts either `bytes` or `str` for both arguments, but the two arguments must be the same type.

  Python's `hmac.new(key, msg, digestmod)` requires `digestmod` since Python 3.8 (verified 2026-05-01). Pass it as a keyword argument: `hmac.new(secret, body, digestmod=hashlib.sha256)`. The fast path is `hmac.digest(key, msg, digest)` (added 3.7) which uses the optimized C implementation when `digest` is a string name like `"sha256"` and OpenSSL is available.

  Two things to keep straight: the secret must be `bytes` (encode with `secret.encode("utf-8")` if you store it as a string), and the message hashed must be the raw request body bytes — not a re-serialized JSON object. Compute the expected digest with `hmac.new(secret_bytes, raw_body_bytes, digestmod=hashlib.sha256).hexdigest()` and pass both the computed and header-supplied hex strings to `hmac.compare_digest` directly.

  ## Per-vendor signature schemes

  Different providers compose the string-to-sign differently. Get this wrong and verification silently fails for one provider while passing for another.

  Stripe (verified 2026-05-01 against docs.stripe.com/webhooks/signatures): header `Stripe-Signature: t=<unix-ts>,v1=<hex-hmac-sha256>[,v0=<legacy>]`. The signed string is `<unix-ts>.<raw-body>`. Default replay tolerance is 300 seconds (5 minutes) when using the Python SDK helper `stripe.Webhook.construct_event(payload, sig_header, secret, tolerance=300)`. The helper raises `stripe.error.SignatureVerificationError` on bad signature OR stale timestamp; both should map to HTTP 400.

  GitHub (verified 2026-05-01 against docs.github.com/en/webhooks/using-webhooks/validating-webhook-deliveries): header `X-Hub-Signature-256: sha256=<hex-hmac-sha256>`. The signed string is the raw request body, with no timestamp prefix. There is no header timestamp at all — replay protection falls entirely to event-id idempotency using the `X-GitHub-Delivery` UUID header. The `sha256=` prefix is part of the header value; strip or include it consistently when comparing.

  Slack (verified 2026-05-01 against api.slack.com/authentication/verifying-requests-from-slack): headers `X-Slack-Signature: v0=<hex-hmac-sha256>` and `X-Slack-Request-Timestamp: <unix-ts>`. The signed string is `v0:<unix-ts>:<raw-body>`. Slack documents a 5-minute replay window — reject anything outside.

  Standard Webhooks v1.0 (verified 2026-05-01 against standardwebhooks.com): headers `webhook-id`, `webhook-timestamp`, `webhook-signature: v1,<base64-hmac-sha256>`. The signed string is `<webhook-id>.<webhook-timestamp>.<raw-body>`. Signature is base64, not hex — adapt your decode call accordingly. Adopted by Svix, Zapier, Twilio, and others.

  ## Replay protection: timestamp tolerance and event-id idempotency

  A signed request without replay protection is a forever-valid bearer token to anyone who captures it once. Two layers, both required.

  Layer 1 is timestamp tolerance. Where the header carries a timestamp (Stripe, Slack, Standard Webhooks), reject any request whose timestamp is more than N seconds old or more than a few seconds in the future. Default tolerance: 300 seconds. Without this, a replayed signature is valid until the secret rotates.

  Layer 2 is event-id idempotency. Every supported provider stamps a unique delivery ID — Stripe's `event.id` (`evt_...`), GitHub's `X-GitHub-Delivery` UUID, Slack's `event_id` field on Events API payloads, Standard Webhooks' `webhook-id` header. Persist a row keyed on (provider, delivery_id) before doing any business work. Re-deliveries either return 200 (already processed — sender stops retrying) or get rejected at the dedup-table unique constraint.

  ```sql
  CREATE TABLE webhook_deliveries (
    provider     text NOT NULL,
    delivery_id  text NOT NULL,
    received_at  timestamptz NOT NULL DEFAULT now(),
    PRIMARY KEY (provider, delivery_id)
  );
  ```

  The dedup row's lifecycle is the load-bearing detail. Insert AFTER signature verification, BEFORE the business handler runs. If the handler raises, the row must be rolled back — either with a transaction wrapping (insert + handler work) or an explicit DELETE on failure. A persisted dedup row plus a 5xx response means the sender's retry hits the dedup constraint, gets a 200, and the event is silently lost.

  ## End-to-end example: FastAPI Stripe webhook with three paths

  The case-space coverage: happy delivery, failed signature, duplicate delivery — all three paths in one FastAPI handler. `db` is an `asyncpg` connection or pool the application establishes at startup; `process_event` is the operator's business-logic entry point.

  ```python
  import os
  import asyncpg
  import stripe
  from asyncpg.exceptions import UniqueViolationError
  from fastapi import FastAPI, Request, HTTPException

  app = FastAPI()
  endpoint_secret = os.environ["STRIPE_WEBHOOK_SECRET"]
  db: asyncpg.Pool = ...   # established at startup, e.g. asyncpg.create_pool(DATABASE_URL)

  async def process_event(event: stripe.Event) -> None:
      # Operator's business logic — credit the customer, fulfill the order, etc.
      # Raise on failure so the outer handler returns 5xx and rolls back the dedup row.
      ...

  @app.post("/webhooks/stripe")
  async def stripe_webhook(request: Request) -> dict:
      raw_body = await request.body()                   # bytes — never re-serialized
      sig_header = request.headers.get("stripe-signature", "")

      # PATH 1: failed signature → 400, log, exit
      try:
          event = stripe.Webhook.construct_event(
              payload=raw_body,
              sig_header=sig_header,
              secret=endpoint_secret,
              tolerance=300,
          )
      except stripe.error.SignatureVerificationError:
          raise HTTPException(status_code=400, detail="invalid signature")

      # PATH 2: duplicate delivery → 200 (so Stripe stops retrying), exit without re-processing
      try:
          await db.execute(
              "INSERT INTO webhook_deliveries (provider, delivery_id) VALUES ($1, $2)",
              "stripe",
              event["id"],
          )
      except UniqueViolationError:
          return {"duplicate": True}

      # PATH 3: happy path → process, 200; on handler failure roll back the dedup row
      try:
          await process_event(event)
      except Exception:
          await db.execute(
              "DELETE FROM webhook_deliveries WHERE provider = $1 AND delivery_id = $2",
              "stripe",
              event["id"],
          )
          raise HTTPException(status_code=500, detail="internal error")

      return {"received": True}
  ```

  The DELETE on the failure path is not optional. If the dedup row persists past a 5xx response, Stripe's next retry is suppressed by the unique constraint, returns 200, and the event never reaches business logic. The alternative is to wrap the INSERT and `process_event(event)` in one database transaction and commit only on success.

  ## Verification checklist

  Mechanical checks for any FastAPI webhook receiver:

  - [ ] Signature is verified against the raw request body. `grep -n 'await request.body' src/` returns the read; no `await request.json()` before the verify call in the same handler.
  - [ ] Comparison uses `hmac.compare_digest`, not `==`. `grep -rn 'hmac.compare_digest\|stripe.Webhook.construct_event' src/` returns at least one hit per handler; `grep -nE 'sig.*==.*expected|expected.*==.*sig' src/` returns nothing.
  - [ ] Webhook secret is loaded from environment. `grep -rn 'whsec_\|SLACK_SIGNING_SECRET' src/` returns env-var references only — no literal secrets.
  - [ ] `digestmod` is passed as a keyword argument to `hmac.new` (Python 3.8+ requires it). `grep -nE 'hmac\.new\([^,]+,[^,]+\)\s*$' src/` returns nothing — that pattern is the legacy two-arg call.
  - [ ] Idempotency table exists with a (provider, delivery_id) primary key, and the handler inserts BEFORE doing business work. `grep -n 'INSERT INTO webhook_deliveries' src/` returns inserts; review each to confirm they precede `process_event(...)` or equivalent.
  - [ ] Duplicate-delivery path returns 200, not 4xx. `grep -B2 -A8 'UniqueViolationError\|23505' src/` — each match's response should be HTTP 200.
  - [ ] Failed-signature path returns 400 or 401, never 200. `grep -B2 -A8 'SignatureVerificationError\|invalid signature' src/`.
  - [ ] Failed-handler path returns 5xx AND rolls back the dedup row. Code-review item: the same code path that returns 5xx must DELETE from `webhook_deliveries` or be inside a transaction that has not committed. `grep -B5 -A15 'INSERT INTO webhook_deliveries' src/` — read each call site for the failure path.
  - [ ] Stripe scheme: `grep -rn 'stripe.Webhook.construct_event' src/` shows the SDK helper called with `tolerance=300`, OR the manual implementation hashes `<ts>.<body>` with HMAC-SHA256.
  - [ ] GitHub scheme: the verifier hashes the raw body with HMAC-SHA256 and compares against the `sha256=...` value of `X-Hub-Signature-256` after the prefix is stripped or included consistently on both sides.
  - [ ] Slack scheme: the verifier composes `v0:<X-Slack-Request-Timestamp>:<raw-body>` and hashes with HMAC-SHA256 against the `v0=...` value of `X-Slack-Signature`; rejects timestamps outside the 5-minute window.
  - [ ] Standard Webhooks scheme: the verifier composes `<webhook-id>.<webhook-timestamp>.<raw-body>`, hashes with HMAC-SHA256, and compares against the **base64**-decoded value of `webhook-signature` (after the `v1,` prefix is stripped).

  ## Guardrails: never do these

  These are the lines you do not cross when implementing a webhook receiver. Each item below has bitten production systems; the verification and example sections show the right shape.

  - Never compare signatures with `==` or `!=`. String equality short-circuits on the first differing byte and leaks the signature one byte at a time through timing side channels. Use `hmac.compare_digest`, which is constant-time for equal-length inputs.
  - Never call `await request.json()` (or any body-parsing dependency) before verifying the signature. Once the body is parsed and re-serialized, the bytes you hash will not match the bytes the sender hashed. Verification will silently fail. Read raw bytes via `await request.body()` first, verify, then parse JSON yourself.
  - Never hard-code the webhook secret. Secrets in source rotate by force-push and leak through git history. The receiver must read from env or a secret manager. `grep -rn 'whsec_' src/` should return nothing.
  - Never trust an unsigned event. No fallback path that skips verification "for testing" or "when the header is missing" — those paths ship to production. Reject with 400 or 401, no exception.
  - Never use HMAC-SHA1 (or anything else) for new receivers. GitHub's legacy `X-Hub-Signature` header is SHA-1 and is deprecated; new receivers use `X-Hub-Signature-256`. Do not accept SHA-1 even as a fallback.
  - Never call `hmac.new(key, msg)` without `digestmod`. Python 3.8 made `digestmod` required (verified 2026-05-01); the two-argument form raises `TypeError` on 3.8+ and was silently insecure on older runtimes.
  - Never leave the dedup row after the handler fails. A persisted row plus a 5xx response means the sender's retry hits the unique constraint, gets a 200, and the event is silently lost. Either roll the row back on failure or wrap (insert + handler work) in one transaction.
  - Never return 4xx on duplicate delivery. A 4xx tells the sender to keep retrying; a 200 tells it to stop. Duplicates are a successful no-op from the sender's perspective.
  - Never trust the timestamp without checking tolerance. A signed request whose timestamp is unbounded is a forever-valid replay token. Reject anything older than 300 seconds (or the sender's documented tolerance).
  - Never log raw signatures, secrets, or full request headers at info level. They become a credential exfiltration surface. Redact in logs; sample-debug only in dev.

