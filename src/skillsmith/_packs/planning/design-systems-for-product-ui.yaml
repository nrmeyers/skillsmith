raw_prose: |
  # Design Systems for Product UI

  A design system is the *named, reusable vocabulary* a product uses to render its UI consistently — tokens for color, typography, spacing; a component taxonomy; layout and interaction patterns. The rule is one sentence: every decision in the design system is derived from the project's actual context (tech stack, design inspiration, workflow needs) — never generic, never copy-pasted from a template. Most design systems that felt off-brand or thin were generic — they shipped a default palette and three button sizes without ever asking what the product actually needed.

  ## Component taxonomy — atoms, molecules, organisms

  Categorize UI components in three tiers (Brad Frost's atomic design):

  - **Atoms** — the smallest reusable primitives: Button, Input, Badge, Avatar, Icon. They have no app context; they compose into everything.
  - **Molecules** — small compositions of atoms with a clear purpose: FormField (Label + Input + Error), Card (Image + Title + Description), SearchBar (Input + Icon + Button).
  - **Organisms** — larger, app-aware components: Header, Sidebar, DataTable, OrderRow.

  List only components the project actually needs based on its workflows and cards. A design system listing thirty components for a six-card product is theater; ship the eight that match the actual UI surface.

  ## Color tokens

  Define a semantic color palette — `primary`, `secondary`, `accent`, `success`, `warning`, `error`, `neutral`. Semantic names (`primary`, `success`) survive theme changes; literal names (`blue-500`, `green-400`) do not.

  Specify light and dark values if the project uses dark mode. Use CSS custom properties or Tailwind conventions matching the tech stack:

  - Tailwind project → `bg-primary`, theme extended in `tailwind.config.{js,ts}`.
  - Plain CSS → `var(--color-primary)` defined in `:root` and `[data-theme=dark]`.

  ## Typography scale

  Define heading levels (`h1`–`h4`), body text, small/caption, and code. For each, specify font family, size, weight, and line-height. Match the project's design inspiration — a brutalist news product and a friendly consumer app have different scales, and the design system should encode that.

  Keep the scale small enough to memorize. Six type styles cover most products; sixteen is a signal the system is theatrical.

  ## Spacing system

  Define a spacing scale on a consistent base (4px or 8px). A 4px base, for example: `xs=4, sm=8, md=16, lg=24, xl=32, 2xl=48`. Apply the same scale to padding, margin, and gap — mixing scales between properties creates inconsistent rhythm that readers notice without knowing why.

  ## Layout patterns

  Specify the page layouts the product needs:

  - Sidebar + main (admin dashboards, settings).
  - Full-width (marketing, content-first surfaces).
  - Centered (auth flows, single-task surfaces).

  Define the grid system, responsive breakpoints, and container max-widths. Container width caps prevent text columns from becoming unreadably wide on big screens.

  ## Interaction patterns

  Define *how* common UX patterns work:

  - **Forms** validate (when? on blur? on submit?) and show errors (inline, summary, both).
  - **Navigation** uses tabs / breadcrumbs / sidebar; rules for when each.
  - **Loading states** appear (skeletons, spinners, optimistic UI).
  - **Feedback** is communicated (toasts, inline success messages, modals for destructive actions).

  Naming these once at the system level prevents every feature from reinventing them. Reinvented feedback is the most visible inconsistency in most products.

  ## Iconography

  Recommend an icon set (Lucide, Heroicons, Material Symbols) and specify sizing conventions — usually 16px / 20px / 24px. Pick one set; mixing sets is immediately visible.

  Match the project's tone: outline icons feel light and modern, filled icons feel solid and conservative.

  ## Derive from context — never generic

  Base every decision on the project's *design_inspiration* field, *tech_stack*, and the actual UI needs implied by the workflow cards. A generic design system is worse than no design system — it ships an unfounded set of constraints the team will later have to fight.

  When in doubt, ask: "What does *this* product need?" Not "What do design systems usually have?"

  ## Verification

  - [ ] Component taxonomy lists only the components the product actually uses.
  - [ ] Color tokens are semantic (`primary`, `success`) not literal (`blue-500`).
  - [ ] Light/dark values are defined if dark mode is supported.
  - [ ] Typography scale has 4–8 named styles, each with family/size/weight/line-height.
  - [ ] Spacing scale uses a single base unit (4px or 8px) and is applied consistently to padding/margin/gap.
  - [ ] Layout patterns, responsive breakpoints, and container max-widths are specified.
  - [ ] Interaction patterns (form validation, navigation, loading, feedback) are named once at the system level.
  - [ ] Iconography uses one icon set with a defined size scale.
  - [ ] Every decision is traceable to the project's design inspiration, tech stack, or workflow needs — none are generic defaults.

