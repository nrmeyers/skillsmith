raw_prose: |
  # SDD — Build (sdd-build)

  ## Overview

  The build phase is where you implement what the spec and design phases produced.
  This workflow skill guides the paid LLM through implementation following SDD
  discipline: one concern at a time, with tests, and with a contract that declares
  intent and domain scope before writing code.

  ## Entering the build phase

  Before writing any code:

  1. Confirm the spec exists and has Acceptance Criteria and Out of Scope sections.
  2. Confirm the design doc exists and describes the approach.
  3. Write a contract (`skillsmith contract init --phase build --slug <task-slug>`)
     that declares `domain_tags` and `scope.touches` for the work ahead.
  4. Use the contract to focus domain retrieval on the right skills.

  ## During the build phase

  - Work in small commits with clear messages.
  - Keep the contract's `scope.touches` honest — if you touch a file not listed,
    update the contract.
  - Run tests after each meaningful change.
  - Do not move to QA until the acceptance criteria in the spec are met.

  ## Exit gate

  The build phase is done when:

  - All spec acceptance criteria have a corresponding test.
  - No known regressions in the existing test suite.
  - The contract's `success_criteria` are checkable and checked.

  Signal readiness with: "done building", "ready for qa", or "implementation complete".

  ## Working alongside Code-Indexer

  After writing a task contract at `.skillsmith/contracts/build/<slug>.md`,
  two tools should inform your next action:

  1. **Skillsmith** — domain skill fragments based on the contract's
     `domain_tags`. Usually injected automatically by the PostToolUse hook;
     if not, run:
         skillsmith compose --contract .skillsmith/contracts/build/<slug>.md

  2. **Code-Indexer** (if running on :8003) — existing code patterns in the
     `scope.touches` paths. Surfaces what already exists so you avoid
     reimplementing or contradicting existing patterns. Run:
         curl -s "http://127.0.0.1:8003/search/semantic?q=<task title>&repo=<repo-slug>&top_k=5"
         curl -s "http://127.0.0.1:8003/search/lexical?q=<domain_tags joined>&repo=<repo-slug>&top_k=5"

  Use Skillsmith for "what patterns should I follow" and Code-Indexer for
  "what patterns already exist here." If they conflict, Code-Indexer is
  ground truth for this codebase; Skillsmith is industry best practice.
  Reconcile in the contract's `scope.avoids` or `success_criteria`
  before writing code.
